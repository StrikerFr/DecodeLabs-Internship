name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Style & Lint
        run: npm run lint

      - name: Build Project
        run: npm run build
        env:
          GROQ_API_KEY: "dummy_value_for_build"
          ELEVENLABS_API_KEY: "dummy_value_for_build"
